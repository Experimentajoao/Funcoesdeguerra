<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math-Brawlers: Torneio de Funções</title>
    <style>
        body { margin: 0; background-color: #050509; color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Cabeçalho */
        .top-bar { display: flex; justify-content: space-between; align-items: center; width: 800px; margin-bottom: 10px; }
        h1 { margin: 0; color: #4CAF50; letter-spacing: 2px; text-transform: uppercase; text-shadow: 0 0 10px rgba(76,175,80,0.6); font-size: 1.5rem; }
        
        /* Nome da Fase Dinâmico */
        #stageNameDisplay { background: #222; border: 1px solid #4CAF50; color: #ffeb3b; padding: 8px 20px; border-radius: 5px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Placar */
        #scoreboard { display: flex; justify-content: space-between; align-items: center; width: 800px; padding: 10px 40px; margin-bottom: 10px; background: rgba(20, 20, 30, 0.9); border: 2px solid #333; border-radius: 12px; box-shadow: 0 5px 20px rgba(0,0,0,0.8); box-sizing: border-box; font-size: 1.6rem; font-weight: 900; }
        .p1-score { color: #60a5fa; text-shadow: 0 0 10px rgba(96,165,250,0.8); }
        .p2-score { color: #f87171; text-shadow: 0 0 10px rgba(248,113,113,0.8); }
        .match-info { font-size: 0.9rem; color: #888; text-transform: uppercase; text-align: center;}
        .match-info span { font-size: 1.2rem; display: block; color: #fff; margin-top: 2px;}

        /* Área do Jogo */
        #game-container { position: relative; width: 800px; height: 500px; }
        canvas { background-color: #11111a; border: 3px solid #444; border-radius: 8px; box-shadow: 0 10px 40px rgba(0,0,0,0.9); width: 100%; height: 100%; display: block; }

        /* Anúncio de Vitória (Estilo Arcade) */
        #announcement {
            display: none; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(10, 10, 15, 0.95); border: 3px solid #ffeb3b; padding: 30px 50px; border-radius: 15px;
            color: #fff; font-size: 2rem; font-weight: bold; text-align: center; text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 235, 59, 0.6); z-index: 100; white-space: nowrap;
        }
        .announce-winner { color: #ffeb3b; font-size: 2.5rem; display: block; margin-bottom: 10px; text-shadow: 0 0 15px #ffeb3b;}

        .controls-info { display: flex; justify-content: space-between; width: 800px; margin-top: 10px; color: #aaa; font-size: 0.85rem; background: rgba(20,20,30,0.8); padding: 8px 20px; border-radius: 8px; box-sizing: border-box; border: 1px solid #333; }
        .controls-info b { color: #fff; }

<link rel="manifest" href="manifest.json">

<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

    </style>
</head>
<body>

<button id="botaoInstalar" style="display: block; background: #0078D7; color: grey; padding: 15px; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 20px auto;">
  📥 Instalar Simulador (Offline)
</button>



    <div class="top-bar">
        <h1>Math-Brawlers</h1>
        <div id="stageNameDisplay">1. Planície Aberta</div>
    </div>
    
    <div id="scoreboard">
        <div class="p1-score">AZUL: <span id="score1">0</span></div>
        <div class="match-info">Melhor de 5<span>Primeiro a 3</span></div>
        <div class="p2-score"><span id="score2">0</span> :VERMELHO</div>
    </div>

    <div id="game-container">
        <canvas id="gameCanvas" width="800" height="500"></canvas>
        <div id="announcement">
            <span class="announce-winner" id="winnerText">JOGADOR AZUL VENCEU!</span>
            Avançando para a próxima arena...
        </div>
    </div>

    <div class="controls-info">
        <div><b>P1:</b> [W, A, D] Move | [Espaço] Atira</div>
        <div><b>P2:</b> [Setas] Move | [Enter] Atira</div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // --- ARQUITETURA DE FASES ---
    const stages = [
        {
            id: 0, name: "1. Planície Aberta",
            player1Start: { x: 50, y: 400 }, player2Start: { x: 700, y: 400 },
            obstacles: [] 
        },
        {
            id: 1, name: "2. O Muro Alto",
            player1Start: { x: 50, y: 400 }, player2Start: { x: 700, y: 400 },
            // Muro da Fase 2 menor
            obstacles: [ { x: 380, y: 350, width: 40, height: 100 } ]
        },
        {
            id: 2, name: "3. Trincheiras Flutuantes",
            player1Start: { x: 50, y: 200 }, player2Start: { x: 700, y: 200 },
            obstacles: [
                { x: 50, y: 320, width: 120, height: 20 },
                { x: 630, y: 320, width: 120, height: 20 },
                { x: 350, y: 380, width: 100, height: 70 }
            ]
        }
    ];

    let currentStageIndex = 0;
    let currentStage = stages[currentStageIndex];
    document.getElementById('stageNameDisplay').innerText = currentStage.name;

    // --- VARIÁVEIS DO TORNEIO ---
    let score = { 1: 0, 2: 0 };
    const WINNING_SCORE = 3; 
    let isTransitioning = false; 

    const GRAVITY = 0.6;
    const JUMP_FORCE = -12;
    const SPEED = 5;
    const FLOOR_Y = 450;

    const keys = {};
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    const functionsDB = [
        { type: 'linear', label: 'f(x) = x', color: '#10b981' }, 
        { type: 'quadratic', label: 'f(x) = x²', color: '#f59e0b' }, 
        { type: 'sine', label: 'Seno(x)', color: '#a855f7' } 
    ];

    class Player {
        constructor(id, color, controls) {
            this.id = id;
            this.width = 46; this.height = 32;
            this.color = color;
            this.controls = controls;
            this.facingRight = id === 1;
            this.resetState();
        }

        resetState() {
            let startPos = this.id === 1 ? currentStage.player1Start : currentStage.player2Start;
            this.x = startPos.x; this.y = startPos.y;
            this.vx = 0; this.vy = 0;
            this.isGrounded = false;
            this.currentFunc = null; 
            this.funcLabel = "BUSQUE";
            this.lastShot = 0;
            this.blinkTimer = 0;
        }

        update() {
            let nextVx = 0;
            if (keys[this.controls.left]) { nextVx = -SPEED; this.facingRight = false; }
            else if (keys[this.controls.right]) { nextVx = SPEED; this.facingRight = true; }
            
            this.x += nextVx;

            currentStage.obstacles.forEach(obs => {
                if (this.x < obs.x + obs.width && this.x + this.width > obs.x &&
                    this.y < obs.y + obs.height && this.y + this.height > obs.y) {
                    if (nextVx > 0) this.x = obs.x - this.width;
                    else if (nextVx < 0) this.x = obs.x + obs.width;
                }
            });

            if (keys[this.controls.jump] && this.isGrounded) { this.vy = JUMP_FORCE; this.isGrounded = false; }

            this.vy += GRAVITY; this.y += this.vy;
            this.isGrounded = false; 

            if (this.y + this.height >= FLOOR_Y) { this.y = FLOOR_Y - this.height; this.vy = 0; this.isGrounded = true; }

            currentStage.obstacles.forEach(obs => {
                if (this.x < obs.x + obs.width && this.x + this.width > obs.x) {
                    if (this.vy > 0 && this.y + this.height >= obs.y && this.y + this.height <= obs.y + this.vy + 2) {
                        this.y = obs.y - this.height; this.vy = 0; this.isGrounded = true;
                    } else if (this.vy < 0 && this.y <= obs.y + obs.height && this.y >= obs.y + obs.height + this.vy - 2) {
                        this.y = obs.y + obs.height; this.vy = 0;
                    }
                }
            });

            if (keys[this.controls.shoot] && this.currentFunc && Date.now() - this.lastShot > 600) {
                shootLaser(this); this.lastShot = Date.now();
            }

            if (this.x < 0) this.x = 0;
            if (this.x + this.width > canvas.width) this.x = canvas.width - this.width;
        }

        draw() {
            ctx.save(); ctx.translate(this.x + this.width/2, this.y + this.height/2);
            if (!this.facingRight) ctx.scale(-1, 1);
            
            ctx.fillStyle = '#111'; ctx.beginPath(); ctx.roundRect(-25, 8, 50, 10, 5); ctx.fill();
            ctx.fillStyle = '#333'; for(let i=0; i<5; i++) { ctx.beginPath(); ctx.arc(-18 + i*9, 13, 3, 0, Math.PI*2); ctx.fill(); }
            
            let bodyGrad = ctx.createLinearGradient(0, -10, 0, 10);
            bodyGrad.addColorStop(0, '#444'); bodyGrad.addColorStop(0.5, '#222'); bodyGrad.addColorStop(1, '#111');
            ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.roundRect(-22, -8, 44, 18, 5); ctx.fill();
            ctx.fillStyle = this.color; ctx.fillRect(-15, 0, 30, 2);

            let turretGrad = ctx.createRadialGradient(0, -12, 2, 0, -12, 12);
            turretGrad.addColorStop(0, '#666'); turretGrad.addColorStop(1, '#333');
            ctx.fillStyle = turretGrad; ctx.beginPath(); ctx.arc(0, -10, 12, Math.PI, 0); ctx.fill();
            
            ctx.fillStyle = '#555'; ctx.fillRect(10, -13, 28, 6); 
            ctx.fillStyle = '#222'; ctx.fillRect(34, -15, 6, 10); 
            
            if (this.currentFunc) {
                let funcColor = functionsDB.find(f => f.type === this.currentFunc).color;
                ctx.fillStyle = funcColor; ctx.fillRect(36, -13, 3, 6); 
            }
            ctx.restore();

            this.blinkTimer += 0.05;
            if (this.currentFunc) {
                let funcColor = functionsDB.find(f => f.type === this.currentFunc).color;
                ctx.fillStyle = funcColor; ctx.font = 'bold 12px monospace';
            } else {
                ctx.fillStyle = Math.sin(this.blinkTimer * 5) > 0 ? '#fff' : '#555'; ctx.font = 'bold 10px sans-serif';
            }
            ctx.textAlign = 'center'; ctx.fillText(this.funcLabel, this.x + this.width/2, this.y - 12);
        }
    }

    const p1 = new Player(1, '#3b82f6', { left: 'KeyA', right: 'KeyD', jump: 'KeyW', shoot: 'Space' });
    const p2 = new Player(2, '#ef4444', { left: 'ArrowLeft', right: 'ArrowRight', jump: 'ArrowUp', shoot: 'Enter' });

    let lasers = []; let bubbles = [];

    function resetRound() {
        lasers = []; bubbles = [];
        p1.resetState(); p2.resetState();
    }

    function handleMatchEnd(winnerId) {
        isTransitioning = true; 
        
        let colorName = winnerId === 1 ? 'AZUL' : 'VERMELHO';
        let colorHex = winnerId === 1 ? '#60a5fa' : '#f87171';
        
        const announceDiv = document.getElementById('announcement');
        const winnerText = document.getElementById('winnerText');
        
        winnerText.innerText = `JOGADOR ${colorName} VENCEU!`;
        winnerText.style.color = colorHex;
        winnerText.style.textShadow = `0 0 15px ${colorHex}`;
        
        announceDiv.style.display = 'block';

        setTimeout(() => {
            currentStageIndex++;
            if (currentStageIndex >= stages.length) {
                currentStageIndex = 0; 
                alert("Torneio Finalizado! Retornando à primeira arena.");
            }
            
            currentStage = stages[currentStageIndex];
            document.getElementById('stageNameDisplay').innerText = currentStage.name;
            
            score = { 1: 0, 2: 0 }; 
            document.getElementById('score1').innerText = "0";
            document.getElementById('score2').innerText = "0";
            
            announceDiv.style.display = 'none';
            isTransitioning = false;
            resetRound();
        }, 4000);
    }

    function spawnBubble() {
        if(isTransitioning) return;
        const func = functionsDB[Math.floor(Math.random() * functionsDB.length)];
        bubbles.push({ x: Math.random() * (canvas.width - 100) + 50, y: -40, baseRadius: 20, func: func, time: Math.random() * 100 });
    }
    setInterval(spawnBubble, 4000);

    function shootLaser(player) {
        let startX = player.facingRight ? player.x + player.width/2 + 38 : player.x + player.width/2 - 38;
        let startY = player.y + 11;
        lasers.push({ x: startX, y: startY, startX: startX, startY: startY, mathX: 0, dir: player.facingRight ? 1 : -1, type: player.currentFunc, owner: player.id, color: player.color, trail: [] });
    }

    function checkCollisions() {
        bubbles.forEach((b, bIndex) => {
            [p1, p2].forEach(p => {
                if (b.x > p.x - b.baseRadius && b.x < p.x + p.width + b.baseRadius && b.y > p.y - b.baseRadius && b.y < p.y + p.height + b.baseRadius) {
                    p.currentFunc = b.func.type; p.funcLabel = b.func.label;
                    bubbles.splice(bIndex, 1);
                }
            });
        });

        lasers.forEach((l, lIndex) => {
            const enemy = l.owner === 1 ? p2 : p1;
            
            if (l.x > enemy.x && l.x < enemy.x + enemy.width && l.y > enemy.y && l.y < enemy.y + enemy.height) {
                score[l.owner]++; 
                document.getElementById(`score${l.owner}`).innerText = score[l.owner];
                
                if (score[l.owner] >= WINNING_SCORE) {
                    handleMatchEnd(l.owner);
                } else {
                    ctx.fillStyle = 'rgba(255,255,255,0.7)'; ctx.fillRect(0,0,canvas.width,canvas.height);
                    resetRound();
                }
                return; 
            }

            currentStage.obstacles.forEach(obs => {
                if (l.x > obs.x && l.x < obs.x + obs.width && l.y > obs.y && l.y < obs.y + obs.height) {
                    lasers.splice(lIndex, 1); 
                }
            });
        });
    }

    function gameLoop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); 
        
        ctx.fillStyle = '#222'; ctx.fillRect(0, FLOOR_Y, canvas.width, canvas.height - FLOOR_Y);
        ctx.fillStyle = '#064e3b'; ctx.fillRect(0, FLOOR_Y, canvas.width, 8);

        currentStage.obstacles.forEach(obs => {
            ctx.fillStyle = '#334155'; ctx.fillRect(obs.x, obs.y, obs.width, obs.height);
            ctx.strokeStyle = '#0f172a'; ctx.lineWidth = 2; ctx.strokeRect(obs.x, obs.y, obs.width, obs.height);
            ctx.fillStyle = '#10b981'; ctx.fillRect(obs.x, obs.y, obs.width, 3);
        });

        if (!isTransitioning) {
            p1.update();
            p2.update();
        }
        p1.draw();
        p2.draw();

        bubbles.forEach((b, index) => {
            if (!isTransitioning) {
                b.time += 0.05; b.y += 1.3; b.x += Math.sin(b.time) * 1.2;
            }
            let currentRadius = b.baseRadius + Math.sin(b.time * 2) * 2;
            
            ctx.shadowBlur = 20; ctx.shadowColor = b.func.color; ctx.beginPath();
            ctx.arc(b.x, b.y, currentRadius, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(10, 10, 15, 0.9)'; ctx.fill();
            ctx.strokeStyle = b.func.color; ctx.lineWidth = 2.5; ctx.stroke();
            ctx.shadowBlur = 0; ctx.fillStyle = '#fff'; ctx.font = 'bold 14px monospace'; ctx.textAlign = 'center'; ctx.fillText(b.func.label, b.x, b.y + 5);

            if (b.y > canvas.height) bubbles.splice(index, 1);
        });

        lasers.forEach((l, index) => {
            if (!isTransitioning) {
                l.mathX += 0.6;
                let mathY = 0;
                
                if (l.type === 'linear') mathY = 0;
                // AQUI ESTÁ A MÁGICA DA NOVA FÍSICA PARABÓLICA:
                else if (l.type === 'quadratic') mathY = -0.015 * Math.pow(l.mathX, 2) + (0.6 * l.mathX);
                else if (l.type === 'sine') mathY = Math.sin(l.mathX * 1.5) * 0.8;

                l.x = l.startX + (l.mathX * 15 * l.dir);
                l.y = l.startY - (mathY * 15);
                l.trail.push({ x: l.x, y: l.y });
            }

            ctx.shadowBlur = 10; ctx.shadowColor = l.color; ctx.beginPath();
            if(l.trail.length > 0) ctx.moveTo(l.trail[0].x, l.trail[0].y);
            for(let i=1; i<l.trail.length; i++) ctx.lineTo(l.trail[i].x, l.trail[i].y);
            ctx.strokeStyle = l.color; ctx.lineWidth = 4; ctx.stroke();
            ctx.beginPath(); ctx.arc(l.x, l.y, 4, 0, Math.PI * 2); ctx.fillStyle = '#fff'; ctx.fill(); ctx.shadowBlur = 0;

            if (l.y > FLOOR_Y || l.x < 0 || l.x > canvas.width) {
                lasers.splice(index, 1);
            }
        });

        if (!isTransitioning) {
            checkCollisions();
        }
        
        requestAnimationFrame(gameLoop);
    }

    gameLoop();

let eventoInstalacao;
const botao = document.getElementById('botaoInstalar');

// O navegador avisa que o sistema (Windows/Android) aceita instalar
window.addEventListener('beforeinstallprompt', (evento) => {
  evento.preventDefault(); 
  eventoInstalacao = evento; 
  botao.style.display = 'block'; // O botão fica visível para o cliente
});

// O que acontece quando o cliente clica no botão
botao.addEventListener('click', () => {
  if (eventoInstalacao) {
    eventoInstalacao.prompt(); // Abre a janela de instalação do Windows/Android
    
    eventoInstalacao.userChoice.then((escolha) => {
      if (escolha.outcome === 'accepted') {
        botao.style.display = 'none'; // Esconde o botão após instalar
      }
      eventoInstalacao = null;
    });
  }
});


</script>

</body>
</html>
